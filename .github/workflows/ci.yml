name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Validate production compose
        env:
          ODIN_PULSE_API_ENV_FILE: ${{ github.workspace }}/deploy/env/api.env.example
          ODIN_PULSE_WEB_ENV_FILE: ${{ github.workspace }}/deploy/env/web.env.example
        run: docker compose -f deploy/compose/docker-compose.prod.yml config
